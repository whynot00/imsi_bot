<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMSI Bot — Debug Panel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Unbounded:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff9d;
    --accent2: #ff3e6c;
    --accent3: #3e8bff;
    --text: #c8c8d8;
    --text-dim: #555570;
    --success: #00ff9d;
    --error: #ff3e6c;
    --warn: #ffcc00;
    --radius: 6px;
    --mono: 'JetBrains Mono', monospace;
    --head: 'Unbounded', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.08) 2px,
      rgba(0,0,0,.08) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-family: var(--head);
    font-size: 14px;
    letter-spacing: .12em;
    color: var(--accent);
    text-transform: uppercase;
  }

  .badge {
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    border-radius: 2px;
    letter-spacing: .1em;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    margin-left: auto;
    transition: background .3s;
    box-shadow: 0 0 0 0 transparent;
  }
  .status-dot.ok  { background: var(--success); box-shadow: 0 0 8px var(--success); }
  .status-dot.err { background: var(--error);   box-shadow: 0 0 8px var(--error); }

  .status-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: .08em;
  }

  main {
    display: grid;
    grid-template-columns: 280px 1fr;
    height: calc(100vh - 61px);
  }

  /* ── sidebar ── */
  nav {
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow-y: auto;
  }

  .nav-group {
    font-size: 10px;
    letter-spacing: .14em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin: 12px 0 6px 8px;
  }
  .nav-group:first-child { margin-top: 0; }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius);
    cursor: pointer;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    text-align: left;
    transition: all .15s;
    width: 100%;
  }
  .nav-btn:hover { background: var(--border); border-color: var(--border); }
  .nav-btn.active {
    background: rgba(0,255,157,.07);
    border-color: rgba(0,255,157,.25);
    color: var(--accent);
  }

  .method {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 3px;
    letter-spacing: .05em;
    flex-shrink: 0;
  }
  .GET  { background: rgba(62,139,255,.15); color: var(--accent3); }
  .POST { background: rgba(0,255,157,.12);  color: var(--accent); }

  /* ── content ── */
  .content {
    display: grid;
    grid-template-rows: 1fr 1fr;
    overflow: hidden;
  }

  .panel {
    padding: 24px 28px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel + .panel {
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,.3);
  }

  .panel-title {
    font-family: var(--head);
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .form-grid {
    display: grid;
    gap: 12px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  label {
    font-size: 10px;
    letter-spacing: .1em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  input[type=text], input[type=file], select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 9px 12px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color .15s;
    width: 100%;
  }
  input[type=text]:focus, select:focus {
    border-color: rgba(0,255,157,.4);
  }
  input[type=file] { cursor: pointer; }

  .token-field {
    position: relative;
  }
  .token-field input { padding-right: 80px; }
  .token-save {
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    font-size: 10px;
    padding: 3px 8px;
    background: var(--border);
    border: none;
    color: var(--text);
    border-radius: 3px;
    cursor: pointer;
    font-family: var(--mono);
    letter-spacing: .05em;
  }
  .token-save:hover { background: #2a2a3a; }

  .suggest-wrap {
    position: relative;
  }
  .suggest-list {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    z-index: 100;
    display: none;
    max-height: 200px;
    overflow-y: auto;
  }
  .suggest-list.open { display: block; }
  .suggest-item {
    padding: 8px 12px;
    cursor: pointer;
    font-size: 12px;
    transition: background .1s;
  }
  .suggest-item:hover { background: var(--border); color: var(--accent); }

  .btn {
    padding: 10px 20px;
    border: 1px solid var(--accent);
    background: rgba(0,255,157,.08);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .08em;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all .15s;
    align-self: flex-start;
  }
  .btn:hover { background: rgba(0,255,157,.18); }
  .btn:active { transform: scale(.98); }
  .btn.danger { border-color: var(--accent2); color: var(--accent2); background: rgba(255,62,108,.08); }
  .btn.danger:hover { background: rgba(255,62,108,.18); }

  /* ── response panel ── */
  .response-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
  }

  .resp-status {
    padding: 3px 8px;
    border-radius: 3px;
    font-weight: 700;
    letter-spacing: .05em;
  }
  .resp-status.ok  { background: rgba(0,255,157,.12);  color: var(--success); }
  .resp-status.err { background: rgba(255,62,108,.12); color: var(--error); }

  .resp-time { color: var(--text-dim); }
  .resp-url  { color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

  pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    overflow: auto;
    font-size: 12px;
    line-height: 1.7;
    flex: 1;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--text);
  }

  .empty-state {
    color: var(--text-dim);
    font-size: 12px;
    padding: 32px 0;
    text-align: center;
    letter-spacing: .08em;
  }

  /* json syntax */
  .jk { color: #88aaff; }
  .jv { color: #f0c060; }
  .js { color: var(--accent); }
  .jn { color: #ff8c69; }
  .jb { color: #cc88ff; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <span class="logo">IMSI&nbsp;Bot</span>
  <span class="badge">DEBUG</span>
  <span class="status-label" id="statusLabel">не подключено</span>
  <span class="status-dot" id="statusDot"></span>
</header>

<main>
  <nav>
    <div class="nav-group">Конфиг</div>
    <button class="nav-btn active" onclick="show('config')">
      <span class="method GET">CFG</span> Токен и адрес
    </button>

    <div class="nav-group">Search</div>
    <button class="nav-btn" onclick="show('searchIMSI')">
      <span class="method GET">GET</span> /search?imsi
    </button>
    <button class="nav-btn" onclick="show('searchIMEI')">
      <span class="method GET">GET</span> /search?imei
    </button>
    <button class="nav-btn" onclick="show('suggest')">
      <span class="method GET">GET</span> /search/suggest
    </button>

    <div class="nav-group">Upload</div>
    <button class="nav-btn" onclick="show('uploadParametr')">
      <span class="method POST">POST</span> /upload/parametr
    </button>
    <button class="nav-btn" onclick="show('uploadRK')">
      <span class="method POST">POST</span> /upload/rk
    </button>
  </nav>

  <div class="content">
    <!-- REQUEST -->
    <div class="panel" id="requestPanel">

      <!-- CONFIG -->
      <div id="pane-config">
        <div class="panel-title">Конфигурация</div>
        <div class="form-grid">
          <div class="field">
            <label>Base URL</label>
            <input type="text" id="baseUrl" value="http://localhost:8080/api" placeholder="http://localhost:8080/api">
          </div>
          <div class="field">
            <label>X-Telegram-Init-Data</label>
            <div class="token-field">
              <input type="text" id="initData" placeholder="query_id=...&user=...&hash=...">
              <button class="token-save" onclick="saveToken()">Сохранить</button>
            </div>
          </div>
        </div>
        <button class="btn" onclick="ping()">Проверить соединение</button>
      </div>

      <!-- SEARCH IMSI -->
      <div id="pane-searchIMSI" style="display:none">
        <div class="panel-title">GET /search?imsi=…</div>
        <div class="form-grid">
          <div class="field">
            <label>IMSI</label>
            <input type="text" id="searchImsiVal" placeholder="250018707381530">
          </div>
        </div>
        <button class="btn" onclick="searchByIMSI()">Отправить</button>
      </div>

      <!-- SEARCH IMEI -->
      <div id="pane-searchIMEI" style="display:none">
        <div class="panel-title">GET /search?imei=…</div>
        <div class="form-grid">
          <div class="field">
            <label>IMEI</label>
            <input type="text" id="searchImeiVal" placeholder="353312113249201">
          </div>
        </div>
        <button class="btn" onclick="searchByIMEI()">Отправить</button>
      </div>

      <!-- SUGGEST -->
      <div id="pane-suggest" style="display:none">
        <div class="panel-title">GET /search/suggest?q=…&kind=…</div>
        <div class="form-grid">
          <div class="field">
            <label>Префикс (q)</label>
            <input type="text" id="suggestQ" placeholder="25001">
          </div>
          <div class="field">
            <label>Тип (kind)</label>
            <select id="suggestKind">
              <option value="imsi">imsi</option>
              <option value="imei">imei</option>
            </select>
          </div>
        </div>
        <button class="btn" onclick="suggest()">Отправить</button>
      </div>

      <!-- UPLOAD PARAMETR -->
      <div id="pane-uploadParametr" style="display:none">
        <div class="panel-title">POST /upload/parametr</div>
        <div class="form-grid">
          <div class="field">
            <label>CSV файл (parametr)</label>
            <input type="file" id="fileParametr" accept=".csv">
          </div>
        </div>
        <button class="btn" onclick="uploadParametr()">Загрузить</button>
      </div>

      <!-- UPLOAD RK -->
      <div id="pane-uploadRK" style="display:none">
        <div class="panel-title">POST /upload/rk</div>
        <div class="form-grid">
          <div class="field">
            <label>CSV файл (rk)</label>
            <input type="file" id="fileRK" accept=".csv">
          </div>
        </div>
        <button class="btn" onclick="uploadRK()">Загрузить</button>
      </div>

    </div>

    <!-- RESPONSE -->
    <div class="panel">
      <div class="panel-title">Ответ</div>
      <div id="responseMeta" class="response-meta" style="display:none">
        <span class="resp-status" id="respStatus"></span>
        <span class="resp-time"  id="respTime"></span>
        <span class="resp-url"   id="respUrl"></span>
      </div>
      <pre id="responseBody"><div class="empty-state">// ответ появится здесь</div></pre>
    </div>
  </div>
</main>

<script>
const panes = ['config','searchIMSI','searchIMEI','suggest','uploadParametr','uploadRK'];

function show(name) {
  panes.forEach(p => {
    document.getElementById('pane-' + p).style.display = p === name ? '' : 'none';
  });
  document.querySelectorAll('.nav-btn').forEach((b, i) => {
    b.classList.toggle('active', panes[i] === name);
  });
}

function getBase()     { return document.getElementById('baseUrl').value.replace(/\/$/, ''); }
function getInitData() { return localStorage.getItem('initData') || document.getElementById('initData').value; }

function saveToken() {
  const v = document.getElementById('initData').value;
  localStorage.setItem('initData', v);
  showResp(null, null, null, '// токен сохранён в localStorage');
}

function headers(extra) {
  return { 'X-Telegram-Init-Data': getInitData(), ...extra };
}

async function request(method, url, body, isForm) {
  const t0 = Date.now();
  let opts = { method, headers: headers(isForm ? {} : { 'Content-Type': 'application/json' }) };
  if (body) opts.body = body;

  try {
    const r = await fetch(url, opts);
    const ms = Date.now() - t0;
    let text;
    try { text = JSON.stringify(await r.json(), null, 2); }
    catch { text = await r.text(); }
    showResp(r.status, ms, url, text);
    updateDot(r.ok);
  } catch(e) {
    showResp(0, Date.now() - t0, url, '// сетевая ошибка: ' + e.message);
    updateDot(false);
  }
}

function showResp(status, ms, url, text) {
  const meta = document.getElementById('responseMeta');
  const st   = document.getElementById('respStatus');
  const tm   = document.getElementById('respTime');
  const ur   = document.getElementById('respUrl');
  const body = document.getElementById('responseBody');

  if (status !== null) {
    meta.style.display = 'flex';
    st.textContent = status;
    st.className = 'resp-status ' + (status >= 200 && status < 300 ? 'ok' : 'err');
    tm.textContent = ms + ' ms';
    ur.textContent = url;
  }
  body.innerHTML = highlight(text);
}

function updateDot(ok) {
  const dot   = document.getElementById('statusDot');
  const label = document.getElementById('statusLabel');
  dot.className = 'status-dot ' + (ok ? 'ok' : 'err');
  label.textContent = ok ? 'подключено' : 'ошибка';
}

function highlight(str) {
  return str
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"([^"]+)":/g, '<span class="jk">"$1"</span>:')
    .replace(/: "([^"]*)"/g, ': <span class="js">"$1"</span>')
    .replace(/: (\d+\.?\d*)/g, ': <span class="jn">$1</span>')
    .replace(/: (true|false)/g, ': <span class="jb">$1</span>')
    .replace(/: null/g, ': <span class="jb">null</span>');
}

async function ping() {
  await request('GET', getBase() + '/search?imsi=test', null, false);
}

async function searchByIMSI() {
  const v = document.getElementById('searchImsiVal').value.trim();
  if (!v) return;
  await request('GET', getBase() + '/search?imsi=' + encodeURIComponent(v));
}

async function searchByIMEI() {
  const v = document.getElementById('searchImeiVal').value.trim();
  if (!v) return;
  await request('GET', getBase() + '/search?imei=' + encodeURIComponent(v));
}

async function suggest() {
  const q    = document.getElementById('suggestQ').value.trim();
  const kind = document.getElementById('suggestKind').value;
  if (!q) return;
  await request('GET', `${getBase()}/search/suggest?q=${encodeURIComponent(q)}&kind=${kind}`);
}

async function uploadParametr() {
  const f = document.getElementById('fileParametr').files[0];
  if (!f) return;
  const fd = new FormData();
  fd.append('file', f);
  await request('POST', getBase() + '/upload/parametr', fd, true);
}

async function uploadRK() {
  const f = document.getElementById('fileRK').files[0];
  if (!f) return;
  const fd = new FormData();
  fd.append('file', f);
  await request('POST', getBase() + '/upload/rk', fd, true);
}

// restore saved token
const saved = localStorage.getItem('initData');
if (saved) document.getElementById('initData').value = saved;
</script>
</body>
</html>
