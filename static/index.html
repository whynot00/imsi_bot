<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMSI Bot — Debug</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Unbounded:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00ff9d;
    --accent2: #ff3e6c;
    --accent3: #3e8bff;
    --text: #c8c8d8;
    --text-dim: #555570;
    --radius: 6px;
    --mono: 'JetBrains Mono', monospace;
    --head: 'Unbounded', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.06) 2px, rgba(0,0,0,.06) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo { font-family: var(--head); font-size: 13px; letter-spacing: .12em; color: var(--accent); }
  .badge { font-size: 10px; padding: 2px 7px; border: 1px solid var(--accent2); color: var(--accent2); border-radius: 2px; letter-spacing: .08em; }

  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-dim); margin-left: auto;
    transition: all .3s;
  }
  .dot.ok  { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .dot.err { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }

  .dot-label { font-size: 11px; color: var(--text-dim); }

  main {
    display: grid;
    grid-template-columns: 260px 1fr;
    height: calc(100vh - 57px);
    overflow: hidden;
  }

  nav {
    border-right: 1px solid var(--border);
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    overflow-y: auto;
  }

  .nav-group {
    font-size: 10px; letter-spacing: .14em; color: var(--text-dim);
    text-transform: uppercase; margin: 10px 0 4px 8px;
  }
  .nav-group:first-child { margin-top: 0; }

  .nav-btn {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px; border-radius: var(--radius);
    cursor: pointer; border: 1px solid transparent;
    background: transparent; color: var(--text);
    font-family: var(--mono); font-size: 12px;
    text-align: left; transition: all .15s; width: 100%;
  }
  .nav-btn:hover { background: var(--border); }
  .nav-btn.active { background: rgba(0,255,157,.07); border-color: rgba(0,255,157,.2); color: var(--accent); }

  .method {
    font-size: 9px; font-weight: 700; padding: 2px 5px;
    border-radius: 3px; letter-spacing: .05em; flex-shrink: 0;
  }
  .GET  { background: rgba(62,139,255,.15); color: var(--accent3); }
  .POST { background: rgba(0,255,157,.12);  color: var(--accent); }
  .CFG  { background: rgba(255,204,0,.1);   color: #ffcc00; }

  .content {
    display: grid;
    grid-template-rows: 1fr 1fr;
    overflow: hidden;
  }

  .panel {
    padding: 20px 24px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .panel + .panel { border-top: 1px solid var(--border); background: rgba(0,0,0,.25); }

  .panel-title {
    font-family: var(--head); font-size: 10px; letter-spacing: .12em;
    text-transform: uppercase; color: var(--text-dim);
    display: flex; align-items: center; gap: 8px;
  }
  .panel-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .form-grid { display: flex; flex-direction: column; gap: 10px; }

  .field { display: flex; flex-direction: column; gap: 4px; }

  label { font-size: 10px; letter-spacing: .1em; color: var(--text-dim); text-transform: uppercase; }

  input[type=text], input[type=file], select {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); font-family: var(--mono); font-size: 12px;
    padding: 8px 10px; border-radius: var(--radius);
    outline: none; transition: border-color .15s; width: 100%;
  }
  input[type=text]:focus, select:focus { border-color: rgba(0,255,157,.35); }

  .btn {
    padding: 9px 18px; border: 1px solid var(--accent);
    background: rgba(0,255,157,.07); color: var(--accent);
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    letter-spacing: .07em; border-radius: var(--radius);
    cursor: pointer; transition: all .15s; align-self: flex-start;
  }
  .btn:hover { background: rgba(0,255,157,.16); }
  .btn:active { transform: scale(.98); }

  .info-block {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px;
    font-size: 12px; line-height: 1.8;
    display: flex; flex-direction: column; gap: 4px;
  }
  .info-row { display: flex; gap: 8px; }
  .info-key { color: var(--text-dim); min-width: 100px; flex-shrink: 0; }
  .info-val { color: var(--text); word-break: break-all; }
  .info-val.ok  { color: var(--accent); }
  .info-val.err { color: var(--accent2); }

  .resp-meta {
    display: flex; align-items: center; gap: 10px;
    font-size: 11px; display: none;
  }
  .resp-status {
    padding: 2px 7px; border-radius: 3px; font-weight: 700;
  }
  .resp-status.ok  { background: rgba(0,255,157,.12);  color: var(--accent); }
  .resp-status.err { background: rgba(255,62,108,.12); color: var(--accent2); }
  .resp-time { color: var(--text-dim); }
  .resp-url  { color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

  pre {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px;
    overflow: auto; font-size: 12px; line-height: 1.7;
    flex: 1; white-space: pre-wrap; word-break: break-all;
  }

  .empty { color: var(--text-dim); font-size: 12px; padding: 24px 0; text-align: center; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <span class="logo">IMSI&nbsp;Bot</span>
  <span class="badge">DEBUG</span>
  <span class="dot-label" id="dotLabel">—</span>
  <span class="dot" id="dot"></span>
</header>

<main>
  <nav>
    <div class="nav-group">Система</div>
    <button class="nav-btn active" onclick="show('auth')">
      <span class="method CFG">TG</span> Авторизация
    </button>

    <div class="nav-group">Search</div>
    <button class="nav-btn" onclick="show('searchIMSI')">
      <span class="method GET">GET</span> /search?imsi
    </button>
    <button class="nav-btn" onclick="show('searchIMEI')">
      <span class="method GET">GET</span> /search?imei
    </button>
    <button class="nav-btn" onclick="show('suggest')">
      <span class="method GET">GET</span> /search/suggest
    </button>

    <div class="nav-group">Upload</div>
    <button class="nav-btn" onclick="show('uploadParametr')">
      <span class="method POST">POST</span> /upload/parametr
    </button>
    <button class="nav-btn" onclick="show('uploadRK')">
      <span class="method POST">POST</span> /upload/rk
    </button>
  </nav>

  <div class="content">
    <div class="panel" id="requestPanel">

      <!-- AUTH -->
      <div id="pane-auth">
        <div class="panel-title">Telegram initData</div>
        <div class="info-block" id="tgInfo">
          <div class="info-row"><span class="info-key">WebApp</span><span class="info-val" id="tgAvail">—</span></div>
          <div class="info-row"><span class="info-key">user_id</span><span class="info-val" id="tgUserId">—</span></div>
          <div class="info-row"><span class="info-key">username</span><span class="info-val" id="tgUsername">—</span></div>
          <div class="info-row"><span class="info-key">initData</span><span class="info-val" id="tgInitData">—</span></div>
          <div class="info-row"><span class="info-key">hash</span><span class="info-val" id="tgHash">—</span></div>
        </div>
        <div class="field">
          <label>Base URL сервера</label>
          <input type="text" id="baseUrl" value="https://vnqp2xcn-8080.euw.devtunnels.ms/api">
        </div>
        <button class="btn" onclick="checkAuth()">Проверить авторизацию на сервере</button>
      </div>

      <!-- SEARCH IMSI -->
      <div id="pane-searchIMSI" style="display:none">
        <div class="panel-title">GET /search?imsi=…</div>
        <div class="form-grid">
          <div class="field">
            <label>IMSI</label>
            <input type="text" id="searchImsiVal" placeholder="250018707381530">
          </div>
        </div>
        <button class="btn" onclick="searchByIMSI()">Отправить</button>
      </div>

      <!-- SEARCH IMEI -->
      <div id="pane-searchIMEI" style="display:none">
        <div class="panel-title">GET /search?imei=…</div>
        <div class="form-grid">
          <div class="field">
            <label>IMEI</label>
            <input type="text" id="searchImeiVal" placeholder="353312113249201">
          </div>
        </div>
        <button class="btn" onclick="searchByIMEI()">Отправить</button>
      </div>

      <!-- SUGGEST -->
      <div id="pane-suggest" style="display:none">
        <div class="panel-title">GET /search/suggest?q=…&kind=…</div>
        <div class="form-grid">
          <div class="field">
            <label>Префикс (q)</label>
            <input type="text" id="suggestQ" placeholder="25001">
          </div>
          <div class="field">
            <label>Тип (kind)</label>
            <select id="suggestKind">
              <option value="imsi">imsi</option>
              <option value="imei">imei</option>
            </select>
          </div>
        </div>
        <button class="btn" onclick="suggest()">Отправить</button>
      </div>

      <!-- UPLOAD PARAMETR -->
      <div id="pane-uploadParametr" style="display:none">
        <div class="panel-title">POST /upload/parametr</div>
        <div class="form-grid">
          <div class="field">
            <label>CSV файл</label>
            <input type="file" id="fileParametr" accept=".csv">
          </div>
        </div>
        <button class="btn" onclick="uploadParametr()">Загрузить</button>
      </div>

      <!-- UPLOAD RK -->
      <div id="pane-uploadRK" style="display:none">
        <div class="panel-title">POST /upload/rk</div>
        <div class="form-grid">
          <div class="field">
            <label>CSV файл</label>
            <input type="file" id="fileRK" accept=".csv">
          </div>
        </div>
        <button class="btn" onclick="uploadRK()">Загрузить</button>
      </div>

    </div>

    <!-- RESPONSE -->
    <div class="panel">
      <div class="panel-title">Ответ</div>
      <div class="resp-meta" id="respMeta">
        <span class="resp-status" id="respStatus"></span>
        <span class="resp-time"   id="respTime"></span>
        <span class="resp-url"    id="respUrl"></span>
      </div>
      <pre id="respBody"><div class="empty">// ответ появится здесь</div></pre>
    </div>
  </div>
</main>

<script>
// ── Telegram WebApp init ──────────────────────────────────────────
const tg = window.Telegram?.WebApp;
let initData = '';

if (tg) {
  tg.ready();
  tg.expand();
  initData = tg.initData || '';

  const u = tg.initDataUnsafe?.user;
  set('tgAvail',    'доступен', 'ok');
  set('tgUserId',   u?.id       ?? '—');
  set('tgUsername', u?.username ?? '—');

  if (initData) {
    const params = new URLSearchParams(initData);
    set('tgInitData', initData.slice(0, 60) + '…');
    set('tgHash',     params.get('hash')?.slice(0, 16) + '…');
  } else {
    set('tgInitData', 'пусто', 'err');
    set('tgHash',     '—');
  }
} else {
  set('tgAvail',    'недоступен (не Telegram)', 'err');
  set('tgInitData', 'запустите из Telegram', 'err');
}

function set(id, val, cls) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = val;
  if (cls) el.className = 'info-val ' + cls;
}

// ── Навигация ─────────────────────────────────────────────────────
const panes = ['auth','searchIMSI','searchIMEI','suggest','uploadParametr','uploadRK'];

function show(name) {
  panes.forEach(p => {
    document.getElementById('pane-' + p).style.display = p === name ? '' : 'none';
  });
  document.querySelectorAll('.nav-btn').forEach((b, i) => {
    b.classList.toggle('active', panes[i] === name);
  });
}

// ── Helpers ───────────────────────────────────────────────────────
function base() { return document.getElementById('baseUrl').value.replace(/\/$/, ''); }

function authHeaders() {
  return { 'X-Telegram-Init-Data': initData };
}

function showResp(status, ms, url, text) {
  const meta = document.getElementById('respMeta');
  meta.style.display = 'flex';
  const st = document.getElementById('respStatus');
  st.textContent = status || 'ERR';
  st.className = 'resp-status ' + (status >= 200 && status < 300 ? 'ok' : 'err');
  document.getElementById('respTime').textContent = ms + ' ms';
  document.getElementById('respUrl').textContent  = url;
  document.getElementById('respBody').innerHTML   = highlight(text);

  const dot = document.getElementById('dot');
  const lbl = document.getElementById('dotLabel');
  if (status >= 200 && status < 300) {
    dot.className = 'dot ok'; lbl.textContent = 'OK';
  } else {
    dot.className = 'dot err'; lbl.textContent = status || 'ERR';
  }
}

async function get(url) {
  const t0 = Date.now();
  try {
    const r = await fetch(url, { headers: authHeaders() });
    const ms = Date.now() - t0;
    const text = await r.text();
    let pretty;
    try { pretty = JSON.stringify(JSON.parse(text), null, 2); }
    catch { pretty = text; }
    showResp(r.status, ms, url, pretty);
  } catch(e) {
    showResp(0, Date.now() - t0, url, '// сетевая ошибка: ' + e.message);
  }
}

// ── Handlers ──────────────────────────────────────────────────────
async function checkAuth() {
  // проверяем авторизацию через /search с заведомо несуществующим imsi
  await get(base() + '/search?imsi=debug_auth_check');
}

async function searchByIMSI() {
  const v = document.getElementById('searchImsiVal').value.trim();
  if (!v) return;
  await get(base() + '/search?imsi=' + encodeURIComponent(v));
}

async function searchByIMEI() {
  const v = document.getElementById('searchImeiVal').value.trim();
  if (!v) return;
  await get(base() + '/search?imei=' + encodeURIComponent(v));
}

async function suggest() {
  const q    = document.getElementById('suggestQ').value.trim();
  const kind = document.getElementById('suggestKind').value;
  if (!q) return;
  await get(`${base()}/search/suggest?q=${encodeURIComponent(q)}&kind=${kind}`);
}

async function uploadParametr() {
  const input = document.getElementById('fileParametr');
  if (!input.files.length) return;
  const fd = new FormData();
  fd.append('file', input.files[0]);
  await upload(base() + '/upload/parametr', fd);
}

async function uploadRK() {
  const input = document.getElementById('fileRK');
  if (!input.files.length) return;
  const fd = new FormData();
  fd.append('file', input.files[0]);
  await upload(base() + '/upload/rk', fd);
}

async function upload(url, fd) {
  const t0 = Date.now();
  try {
    const r = await fetch(url, {
      method: 'POST',
      headers: authHeaders(),
      body: fd,
    });
    const ms = Date.now() - t0;
    const text = await r.text();
    let pretty;
    try { pretty = JSON.stringify(JSON.parse(text), null, 2); }
    catch { pretty = text; }
    showResp(r.status, ms, url, pretty);
  } catch(e) {
    showResp(0, Date.now() - t0, url, '// сетевая ошибка: ' + e.message);
  }
}

function highlight(str) {
  return str
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"([^"]+)":/g, '<span style="color:#88aaff">"$1"</span>:')
    .replace(/: "([^"]*)"/g, ': <span style="color:#00ff9d">"$1"</span>')
    .replace(/: (\d+\.?\d*)/g, ': <span style="color:#ff8c69">$1</span>')
    .replace(/: (true|false|null)/g, ': <span style="color:#cc88ff">$1</span>');
}
</script>
</body>
</html>
